<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>MindAR Test</title>

  <!-- A-Frame + MindAR — confirmed working combination -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body { margin: 0; font-family: sans-serif; background: #000; }

    #overlay {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 999;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    #status {
      background: rgba(0,0,0,0.7);
      color: #fff;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: bold;
      width: fit-content;
    }

    .badge {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: bold;
      background: #374151;
      color: #fff;
      width: fit-content;
    }
    .badge.found { background: #16a34a; }

    #log {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.8);
      color: #a3e635;
      font-size: 11px;
      font-family: monospace;
      padding: 8px;
      max-height: 140px;
      overflow-y: auto;
      z-index: 999;
    }
  </style>
</head>
<body>

  <!--
    IMPORTANT: Replace "targets.mind" with the path to your compiled .mind file.
    Generate it at: https://hiukim.github.io/mind-ar-js-doc/tools/compile
    Upload both marker images → click Compile → download targets.mind
    Put targets.mind in the same folder as this index.html on Vercel.
  -->
  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: yes; uiError: yes; uiScanning: yes;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets></a-assets>

    <!-- Target 0 — first image you uploaded when compiling -->
    <a-entity mindar-image-target="targetIndex: 0" id="target-0">
      <a-box position="0 0 0" scale="0.5 0.5 0.1" color="orange" opacity="0.8"></a-box>
    </a-entity>

    <!-- Target 1 — second image you uploaded when compiling -->
    <a-entity mindar-image-target="targetIndex: 1" id="target-1">
      <a-box position="0 0 0" scale="0.5 0.5 0.1" color="#3b82f6" opacity="0.8"></a-box>
    </a-entity>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
  </a-scene>

  <div id="overlay">
    <div id="status">⏳ Starting MindAR...</div>
    <div class="badge" id="badge-0">TARGET 0 (orange): not seen</div>
    <div class="badge" id="badge-1">TARGET 1 (blue): not seen</div>
  </div>

  <div id="log"></div>

  <script>
    function log(msg) {
      const el = document.getElementById('log');
      const line = document.createElement('div');
      line.textContent = new Date().toLocaleTimeString() + '  ' + msg;
      el.insertBefore(line, el.firstChild);
      console.log(msg);
    }

    window.onerror = function(msg, src, line) {
      log('ERROR: ' + msg + ' [line ' + line + ']');
      document.getElementById('status').textContent = '❌ JS error — see log';
      document.getElementById('status').style.background = 'rgba(220,38,38,0.8)';
    };

    const scene = document.querySelector('a-scene');

    scene.addEventListener('loaded', function() {
      log('Scene loaded OK');
      document.getElementById('status').textContent = '✅ Ready — show a target image';
      document.getElementById('status').style.background = 'rgba(22,163,74,0.8)';
    });

    scene.addEventListener('arReady', function() {
      log('MindAR ready — camera active');
    });

    scene.addEventListener('arError', function(e) {
      log('MindAR error: ' + JSON.stringify(e.detail));
      document.getElementById('status').textContent = '❌ MindAR error — check log';
      document.getElementById('status').style.background = 'rgba(220,38,38,0.8)';
    });

    // Target 0 events
    document.getElementById('target-0').addEventListener('targetFound', function() {
      log('TARGET 0: FOUND');
      const b = document.getElementById('badge-0');
      b.textContent = 'TARGET 0 (orange): ✅ FOUND';
      b.classList.add('found');
      document.getElementById('status').textContent = 'Target 0 detected!';
    });
    document.getElementById('target-0').addEventListener('targetLost', function() {
      log('TARGET 0: lost');
      const b = document.getElementById('badge-0');
      b.textContent = 'TARGET 0 (orange): not seen';
      b.classList.remove('found');
    });

    // Target 1 events
    document.getElementById('target-1').addEventListener('targetFound', function() {
      log('TARGET 1: FOUND');
      const b = document.getElementById('badge-1');
      b.textContent = 'TARGET 1 (blue): ✅ FOUND';
      b.classList.add('found');
      document.getElementById('status').textContent = 'Target 1 detected!';
    });
    document.getElementById('target-1').addEventListener('targetLost', function() {
      log('TARGET 1: lost');
      const b = document.getElementById('badge-1');
      b.textContent = 'TARGET 1 (blue): not seen';
      b.classList.remove('found');
    });

    log('Scripts loaded — waiting for scene...');
  </script>
</body>
</html>
