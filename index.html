<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Marker Scanner</title>

  <script src="https://cdn.jsdelivr.net/npm/aframe@1.3.0/dist/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@ar-js-org/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #000;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }

    /* ── Badges ── */
    #ui-overlay {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
      z-index: 999;
      pointer-events: none;
    }

    .badge {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #fff;
      background: rgba(60, 60, 60, 0.85);
      border: 2px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(6px);
      transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
      user-select: none;
    }

    .badge .dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: #777;
      transition: background 0.3s ease, box-shadow 0.3s ease;
      flex-shrink: 0;
    }

    .badge.found {
      background: rgba(30, 160, 80, 0.92);
      border-color: rgba(80, 255, 140, 0.5);
      box-shadow: 0 0 18px rgba(50, 255, 120, 0.45);
    }

    .badge.found .dot {
      background: #7fff9e;
      box-shadow: 0 0 8px #50ff90;
    }

    /* ── Log ── */
    #log-box {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: min(420px, 92vw);
      background: rgba(0, 0, 0, 0.72);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      backdrop-filter: blur(8px);
      z-index: 999;
      overflow: hidden;
      pointer-events: none;
    }

    #log-header {
      padding: 7px 14px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    #log-entries {
      max-height: 150px;
      overflow-y: auto;
      padding: 6px 0;
    }

    #log-entries::-webkit-scrollbar { width: 4px; }
    #log-entries::-webkit-scrollbar-track { background: transparent; }
    #log-entries::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    .log-entry {
      display: flex;
      gap: 10px;
      padding: 4px 14px;
      font-size: 12.5px;
      color: rgba(255,255,255,0.75);
      animation: fadeIn 0.25s ease;
    }

    .log-entry .ts {
      color: rgba(255,255,255,0.3);
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    .log-entry.ok  { color: #7bffb0; }
    .log-entry.err { color: #ff7b7b; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- ── A-Frame Scene ── -->
  <a-scene
    embedded
    arjs="sourceType:webcam; debugUIEnabled:false;"
    renderer="antialias: true; alpha: true;"
    vr-mode-ui="enabled:false"
    style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;"
  >
    <a-marker preset="hiro" id="m-hiro" emitevents="true">
      <a-box position="0 0.5 0" color="orange" scale="1.5 1.5 1.5"></a-box>
    </a-marker>
    <a-marker preset="kanji" id="m-kanji" emitevents="true">
      <a-box position="0 0.5 0" color="blue" scale="1.5 1.5 1.5"></a-box>
    </a-marker>
    <a-entity camera></a-entity>
  </a-scene>

  <!-- ── Status Badges ── -->
  <div id="ui-overlay">
    <div class="badge" id="badge-hiro">
      <span class="dot"></span>
      HIRO
    </div>
    <div class="badge" id="badge-kanji">
      <span class="dot"></span>
      KANJI
    </div>
  </div>

  <!-- ── Log ── -->
  <div id="log-box">
    <div id="log-header">Event Log</div>
    <div id="log-entries"></div>
  </div>

  <script>
    // ── Logging helper ──────────────────────────────────────────
    function log(msg, type) {
      var container = document.getElementById('log-entries');
      var now = new Date();
      var ts = now.toTimeString().slice(0, 8);

      var entry = document.createElement('div');
      entry.className = 'log-entry' + (type ? ' ' + type : '');
      entry.innerHTML =
        '<span class="ts">' + ts + '</span>' +
        '<span class="msg">' + msg + '</span>';

      container.appendChild(entry);
      container.scrollTop = container.scrollHeight;

      // Keep last 50 entries
      while (container.children.length > 50) {
        container.removeChild(container.firstChild);
      }
    }

    // ── Badge helper ────────────────────────────────────────────
    function setBadge(id, found) {
      var el = document.getElementById(id);
      if (found) {
        el.classList.add('found');
      } else {
        el.classList.remove('found');
      }
    }

    // ── Global error capture ────────────────────────────────────
    window.onerror = function(msg, src, line) {
      // "Script error." with no src = cross-origin CDN noise, not actionable
      if (msg === 'Script error.' && !src) return true;
      log('ERROR: ' + msg + (line ? ' (line ' + line + ')' : ''), 'err');
    };

    // ── Scene events ─────────────────────────────────────────────
    var scene = document.querySelector('a-scene');

    scene.addEventListener('loaded', function () {
      log('Scene loaded OK', 'ok');

      document.getElementById('m-hiro').addEventListener('markerFound', function () {
        setBadge('badge-hiro', true);
        log('HIRO FOUND', 'ok');
      });
      document.getElementById('m-hiro').addEventListener('markerLost', function () {
        setBadge('badge-hiro', false);
        log('HIRO LOST');
      });

      document.getElementById('m-kanji').addEventListener('markerFound', function () {
        setBadge('badge-kanji', true);
        log('KANJI FOUND', 'ok');
      });
      document.getElementById('m-kanji').addEventListener('markerLost', function () {
        setBadge('badge-kanji', false);
        log('KANJI LOST');
      });
    });

    scene.addEventListener('arjs-video-loaded', function () {
      log('Camera ready', 'ok');
    });
  </script>

</body>
</html>
