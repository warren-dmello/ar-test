<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>AR Test</title>
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.2.0/dist/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@ar-js-org/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>
  <style>
    body { margin: 0; background: #000; font-family: sans-serif; }
    #overlay {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 999; padding: 12px; display: flex;
      flex-direction: column; gap: 8px; pointer-events: none;
    }
    .badge {
      display: inline-block; padding: 10px 18px; border-radius: 10px;
      font-size: 15px; font-weight: bold; color: #fff;
      background: #374151; width: fit-content;
    }
    .badge.found { background: #16a34a; }
    .badge.error { background: #dc2626; }
    #log {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.85); color: #a3e635;
      font-size: 12px; font-family: monospace;
      padding: 8px; max-height: 160px; overflow-y: auto;
      z-index: 999;
    }
  </style>
</head>
<body>

<a-scene
  embedded
  arjs="sourceType:webcam; debugUIEnabled:false;"
  vr-mode-ui="enabled:false"
  style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;"
>
  <a-marker preset="hiro" id="m-hiro" emitevents="true">
    <a-box position="0 0.5 0" color="#f97316" scale="1.5 1.5 1.5"></a-box>
  </a-marker>
  <a-marker preset="kanji" id="m-kanji" emitevents="true">
    <a-box position="0 0.5 0" color="#3b82f6" scale="1.5 1.5 1.5"></a-box>
  </a-marker>
  <a-entity camera></a-entity>
</a-scene>

<div id="overlay">
  <div class="badge" id="b-status">Loading scripts...</div>
  <div class="badge" id="b-hiro">HIRO marker: not seen</div>
  <div class="badge" id="b-kanji">KANJI marker: not seen</div>
</div>
<div id="log"></div>

<script>
  function log(msg) {
    var el = document.getElementById('log');
    var d = document.createElement('div');
    d.textContent = new Date().toLocaleTimeString() + '  ' + msg;
    el.insertBefore(d, el.firstChild);
    console.log(msg);
  }

  log('Scripts loaded OK');
  document.getElementById('b-status').textContent = 'Scripts loaded - waiting for scene';

  window.onerror = function(msg, src, line) {
    log('JS ERROR: ' + msg + ' (line ' + line + ')');
    document.getElementById('b-status').textContent = 'JS error - check log';
    document.getElementById('b-status').classList.add('error');
  };

  var scene = document.querySelector('a-scene');

  scene.addEventListener('loaded', function() {
    log('Scene loaded OK - show a marker to the camera');
    document.getElementById('b-status').textContent = 'Scene ready - show Hiro or Kanji marker';
    document.getElementById('b-status').classList.add('found');

    document.getElementById('m-hiro').addEventListener('markerFound', function() {
      log('HIRO: markerFound event fired');
      document.getElementById('b-hiro').textContent = 'HIRO: FOUND (event)';
      document.getElementById('b-hiro').classList.add('found');
    });
    document.getElementById('m-hiro').addEventListener('markerLost', function() {
      log('HIRO: markerLost event fired');
      document.getElementById('b-hiro').textContent = 'HIRO: not seen';
      document.getElementById('b-hiro').classList.remove('found');
    });
    document.getElementById('m-kanji').addEventListener('markerFound', function() {
      log('KANJI: markerFound event fired');
      document.getElementById('b-kanji').textContent = 'KANJI: FOUND (event)';
      document.getElementById('b-kanji').classList.add('found');
    });
    document.getElementById('m-kanji').addEventListener('markerLost', function() {
      log('KANJI: markerLost event fired');
      document.getElementById('b-kanji').textContent = 'KANJI: not seen';
      document.getElementById('b-kanji').classList.remove('found');
    });

    var mh = document.getElementById('m-hiro');
    var mk = document.getElementById('m-kanji');
    var hiroWas = false, kanjiWas = false;
    function poll() {
      var hNow = !!(mh.object3D && mh.object3D.visible);
      var kNow = !!(mk.object3D && mk.object3D.visible);
      if (hNow !== hiroWas) {
        hiroWas = hNow;
        log('HIRO: object3D.visible changed to ' + hNow);
        document.getElementById('b-hiro').textContent = hNow ? 'HIRO: FOUND (tick)' : 'HIRO: not seen';
        hNow ? document.getElementById('b-hiro').classList.add('found')
              : document.getElementById('b-hiro').classList.remove('found');
      }
      if (kNow !== kanjiWas) {
        kanjiWas = kNow;
        log('KANJI: object3D.visible changed to ' + kNow);
        document.getElementById('b-kanji').textContent = kNow ? 'KANJI: FOUND (tick)' : 'KANJI: not seen';
        kNow ? document.getElementById('b-kanji').classList.add('found')
              : document.getElementById('b-kanji').classList.remove('found');
      }
      requestAnimationFrame(poll);
    }
    poll();
  });

  scene.addEventListener('arjs-video-loaded', function() {
    log('Camera video stream loaded OK');
  });
</script>
</body>
</html>
